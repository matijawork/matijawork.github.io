<!doctype html>
<html lang="hr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<title>Moj raspored</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.webmanifest">
</head>
<body>

<header class="topbar">
  <h1>Moj raspored</h1>
  <div class="topbar-actions">
    <span id="status-dot" class="dot" title="offline/online"></span>
    <button id="refresh-btn" aria-label="Osvježi">↻</button>
    <button id="settings-btn" aria-label="Postavke">⚙</button>
  </div>
</header>

<nav class="tabs">
  <button class="tab active" data-tab="plan">Plan</button>
  <button class="tab" data-tab="inbox">Inbox</button>
  <button class="tab" data-tab="preferences">Preferencije</button>
  <button class="tab" data-tab="context">Kontekst</button>
</nav>

<main>

<section id="tab-plan" class="pane active">
  <div class="pane-head">
    <h2 id="plan-title">Plan</h2>
    <span class="muted" id="plan-updated"></span>
  </div>
  <article id="plan-content" class="markdown">Učitavanje…</article>
</section>

<section id="tab-inbox" class="pane">
  <div class="pane-head">
    <h2>Inbox</h2>
  </div>
  <form id="inbox-form" class="inbox-form">
    <input id="inbox-input" placeholder="Novi zadatak…" autocomplete="off">
    <select id="inbox-tag">
      <option value="@hitno">@hitno</option>
      <option value="@danas">@danas</option>
      <option value="@sutra" selected>@sutra</option>
      <option value="@tjedan">@tjedan</option>
      <option value="@kasnije">@kasnije</option>
    </select>
    <button type="submit">Dodaj</button>
  </form>
  <ul id="inbox-list" class="tasklist"></ul>
</section>

<section id="tab-preferences" class="pane">
  <div class="pane-head"><h2>Preferencije</h2></div>
  <textarea id="preferences-editor" spellcheck="false"></textarea>
  <div class="pane-actions">
    <button id="preferences-save">Spremi</button>
    <span class="muted" id="preferences-status"></span>
  </div>
</section>

<section id="tab-context" class="pane">
  <div class="pane-head"><h2>Kontekst</h2><span class="muted" id="context-size"></span></div>
  <article id="context-content" class="markdown"></article>
</section>

</main>

<dialog id="settings-dialog">
  <form method="dialog">
    <h3>Postavke</h3>
    <label>
      GitHub token
      <input id="token-input" type="password" autocomplete="off" placeholder="ghp_…">
    </label>
    <label>
      Repo (owner/name)
      <input id="repo-input" placeholder="matijawork/matijawork.github.io">
    </label>
    <label>
      Grana
      <input id="branch-input" placeholder="main" value="main">
    </label>
    <div class="dialog-actions">
      <button value="save">Spremi</button>
      <button value="cancel">Otkaži</button>
    </div>
    <p class="muted small">Token ostaje samo na ovom uređaju (localStorage). Treba `repo` scope.</p>
  </form>
</dialog>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" defer></script>
<script src="app.js" defer></script>
</body>
</html>
