<!doctype html>
<html lang="hr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Moj raspored</title>
<link rel="stylesheet" href="style.css?v=2.4.0">
<link rel="manifest" href="manifest.webmanifest">
</head>
<body>

<div id="app">

  <div id="progress-bar"></div>

  <header id="hero" class="hero">
    <div class="hero-left">
      <p id="hero-date" class="hero-date"></p>
      <h1 id="hero-title" class="hero-title">Moj raspored</h1>
      <p id="hero-countdown" class="hero-countdown"></p>
    </div>
    <div class="hero-right">
      <span id="hero-smjena" class="badge" hidden></span>
      <div class="hero-actions">
        <span id="status-dot" class="dot" title="offline/online"></span>
        <button id="refresh-btn" aria-label="Osvježi">↻</button>
      </div>
    </div>
  </header>

  <main class="single-scroll">

    <section class="block" id="section-raspored">
      <div class="section-head"><h2>Raspored</h2></div>
      <div class="timeline-wrap card">
        <div id="timeline" class="timeline" role="list" aria-label="Dnevni raspored"></div>
      </div>
    </section>

    <section class="block" id="section-danas">
      <div class="section-head"><h2>Danas</h2></div>
      <article id="danas-checklist" class="card markdown"></article>
    </section>

    <section class="block" id="section-zadaci">
      <div class="section-head"><h2>Zadaci</h2></div>
      <form id="zadaci-form" class="zadaci-form card">
        <input id="zadaci-input" placeholder="Novi zadatak…" autocomplete="off">
        <select id="zadaci-tag">
          <option value="@hitno">@hitno</option>
          <option value="@danas">@danas</option>
          <option value="@sutra" selected>@sutra</option>
          <option value="@tjedan">@tjedan</option>
        </select>
        <button type="submit">Dodaj</button>
      </form>
      <ul id="zadaci-list" class="tasklist"></ul>
    </section>

  </main>

  <footer class="footer">
    <div id="spy-indicator" class="spy-indicator"></div>
    <button type="button" class="icon-btn" id="footer-settings" aria-label="Postavke">
      <span class="ico">⚙</span><span class="lbl">Postavke</span>
    </button>
    <button type="button" class="icon-btn" id="footer-preferences" aria-label="Preferencije">
      <span class="ico">📝</span><span class="lbl">Preferencije</span>
    </button>
    <button type="button" class="icon-btn" id="footer-context" aria-label="Kontekst">
      <span class="ico">🧠</span><span class="lbl">Kontekst</span>
    </button>
  </footer>

</div>

<div id="toast-stack" aria-live="polite"></div>

<dialog id="preferences-dialog" class="sheet">
  <form method="dialog">
    <div class="sheet-grip"></div>
    <h3>Preferencije</h3>
    <textarea id="preferences-editor" spellcheck="false"></textarea>
    <span class="muted small" id="preferences-status"></span>
    <div class="dialog-actions">
      <button value="close">Zatvori</button>
      <button type="button" id="preferences-save" class="primary">Spremi</button>
    </div>
  </form>
</dialog>

<dialog id="context-dialog" class="sheet">
  <form method="dialog">
    <div class="sheet-grip"></div>
    <h3>Kontekst <span class="muted small" id="context-size"></span></h3>
    <article id="context-content" class="markdown"></article>
    <div class="dialog-actions">
      <button value="close">Zatvori</button>
    </div>
  </form>
</dialog>

<dialog id="settings-dialog" class="sheet">
  <form method="dialog">
    <div class="sheet-grip"></div>
    <h3>Postavke</h3>

    <fieldset>
      <legend>GitHub token</legend>
      <label>Token<input id="token-input" type="password" autocomplete="off" placeholder="ghp_…"></label>
      <button type="button" id="token-save" class="primary">Ažuriraj token</button>
      <span class="muted small" id="token-status"></span>
      <p class="muted small">Fine-grained PAT, Contents R/W za <code>matijawork/matijawork.github.io</code>.</p>
    </fieldset>

    <fieldset>
      <legend>Održavanje</legend>
      <button type="button" id="clear-cache">Obriši cache (token ostaje)</button>
      <button type="button" id="clear-all">Obriši sve (token + cache)</button>
    </fieldset>

    <p class="muted small version">Verzija: <span id="app-version"></span></p>

    <div class="dialog-actions">
      <button value="close">Zatvori</button>
    </div>
  </form>
</dialog>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" defer></script>
<script src="app.js?v=2.4.0" defer></script>
</body>
</html>
